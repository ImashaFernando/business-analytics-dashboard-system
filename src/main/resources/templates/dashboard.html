<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Analytics Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        :root {
            --bg: #0d0f14;
            --card: #161920;
            --border: #262a35;
            --text: #e6e6e6;
            --muted: #9aa4b2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial;
            background: var(--bg);
            color: var(--text);
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            height: 100vh;
            background: #0b0d12;
            border-right: 1px solid var(--border);
            padding: 20px;
            position: fixed;
        }

        .menu a {
            display: block;
            padding: 12px;
            margin-bottom: 10px;
            color: var(--muted);
            text-decoration: none;
            border-radius: 10px;
        }

        .menu a:hover {
            background: #1f2430;
            color: white;
        }

        .active {
            background: #8b7dff;
            color: white !important;
        }

        /* MAIN */
        .main {
            margin-left: 240px;
            padding: 20px;
            width: 100%;
        }

        /* TOP BAR */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* KPI */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .card {
            background: var(--card);
            padding: 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .kpi-title {
            color: var(--muted);
            font-size: 12px;
        }

        .kpi-value {
            font-size: 24px;
            margin-top: 10px;
        }

        /* CHARTS */
        .charts {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .charts-bottom {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        canvas {
            width: 100% !important;
            height: 320px !important;
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .btn {
            padding: 10px 14px;
            background: #8b7dff;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        .btn:hover {
            background: #6f63ff;
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>📊 Analytics</h3>

    <div class="menu">
        <a class="active" href="/dashboard">Overview</a>
        <a href="/products">Products</a>
        <a href="/sales">Add Sale</a>
        <a href="/sales/list">Sales List</a>
        <a href="/report">Reports</a>
        <a href="/sales/trash">🗑 Trash Bin</a>
    </div>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
        <h2>Dashboard Overview</h2>

        <div style="display:flex; gap:10px;">
            <a href="/export/pdf" class="btn">📤 Export</a>
            <a href="/dashboard" class="btn">🔄 Refresh</a>
        </div>
    </div>

    <!-- KPI -->
    <div class="grid">

        <div class="card">
            <div class="kpi-title">TOTAL PRODUCTS</div>
            <div class="kpi-value" id="products">0</div>
        </div>

        <div class="card">
            <div class="kpi-title">TOTAL SALES</div>
            <div class="kpi-value" id="sales">0</div>
        </div>

        <div class="card">
            <div class="kpi-title">REVENUE</div>
            <div class="kpi-value" id="revenue">0</div>
        </div>

        <div class="card">
            <div class="kpi-title">BEST PRODUCT</div>
            <div class="kpi-value" th:text="${bestProduct}"></div>
        </div>

    </div>

    <!-- TOP CHARTS -->
    <div class="charts">
        <canvas id="barChart"></canvas>
        <canvas id="donutChart"></canvas>
    </div>

    <!-- BOTTOM CHARTS -->
    <div class="charts-bottom">
        <canvas id="trendChart"></canvas>
        <canvas id="profitChart"></canvas>
    </div>

    <div class="charts-bottom">
        <canvas id="topProductsChart"></canvas>

        <div class="card">
            <div class="kpi-title">TODAY SALES</div>
            <div class="kpi-value" style="color:#20c997;">
                <span th:if="${todaySales > 0}">
                    Rs.<span th:text="${#numbers.formatDecimal(todaySales, 1, 2)}"></span>
                </span>
                <span th:if="${todaySales == 0}">
                    No Sales Today
                </span>
            </div>

        </div>
    </div>
    <div class="card" style="margin-top:20px;">

        <div class="kpi-title">LOW STOCK ALERT</div>

        <div style="
        margin-top:10px;
        padding:10px;
        border-radius:12px;
        background:#1a1d25;
        border:1px solid #2a2f3a;">

            <!-- HEADER BADGE -->
            <div style="
            display:inline-block;
            background:#ff4d4d;
            color:white;
            padding:5px 10px;
            border-radius:6px;
            font-size:12px;
            margin-bottom:10px;">
                ⚠ LOW STOCK
            </div>

            <!-- LIST -->
            <div th:each="p : ${lowStockProducts}"
                 style="
                display:flex;
                justify-content:space-between;
                align-items:center;
                padding:10px;
                margin-bottom:8px;
                border-radius:8px;
                background:#12151c;">

                <!-- PRODUCT NAME -->
                <div style="font-weight:500;">
                    <span th:text="${p.name}"></span>
                </div>

                <!-- QTY -->
                <div style="opacity:0.8;">
                    Qty: <span th:text="${p.qty}"></span>
                </div>

                <!-- STATUS -->
                <div>
                <span th:if="${p.status == 'CRITICAL'}"
                      style="background:#ff4d4d;color:white;padding:4px 8px;border-radius:6px;font-size:12px;">
                    CRITICAL
                </span>

                    <span th:if="${p.status == 'WARNING'}"
                          style="background:#ffb020;color:black;padding:4px 8px;border-radius:6px;font-size:12px;">
                    WARNING
                </span>
                </div>

            </div>

        </div>
    </div>
</div>

<!-- SCRIPT -->
<script th:inline="javascript">

    const labels = /*[[${salesLabels}]]*/ [];
    const data = /*[[${salesData}]]*/ [];

    function animateValue(id, end) {
        let start = 0;
        let step = Math.ceil(end / 50);

        let interval = setInterval(() => {
            start += step;
            if (start >= end) {
                start = end;
                clearInterval(interval);
            }
            document.getElementById(id).innerText = start;
        }, 30);
    }

    animateValue("products", /*[[${totalProducts}]]*/ 7);
    animateValue("sales", /*[[${totalSales}]]*/ 13);
    animateValue("revenue", /*[[${totalRevenue}]]*/ 21010);

    // BAR
    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Sales',
                data: data,
                backgroundColor: '#20c997'
            }]
        }
    });

    // DONUT
    new Chart(document.getElementById('donutChart'), {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: data,
                backgroundColor: ['#8b7dff','#20c997','#ffb020','#ff4d8d']
            }]
        }
    });

    // TREND
    new Chart(document.getElementById('trendChart'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Revenue',
                data: data,
                borderColor: '#8b7dff',
                fill: true,
                tension: 0.4
            }]
        }
    });

    // PROFIT
    new Chart(document.getElementById('profitChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'Profit',
                    data: data.map(v => v * 0.7),
                    backgroundColor: '#20c997'
                },
                {
                    label: 'Loss',
                    data: data.map(v => v * 0.3),
                    backgroundColor: '#ff4d8d'
                }
            ]
        }
    });

    // TOP PRODUCTS
    new Chart(document.getElementById('topProductsChart'), {
        type: 'bar',
        data: {
            labels: ['iPhone','Laptop','Tablet','Printer','Mouse'],
            datasets: [{
                label: 'Top Products',
                data: [12000,9000,5000,2000,800],
                backgroundColor: '#8b7dff'
            }]
        }
    });

</script>

</body>
</html>
