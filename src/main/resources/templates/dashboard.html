<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Business Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            width: 220px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
            text-align: center;
        }

        .card h3 {
            margin: 0;
            color: #666;
        }

        .card h2 {
            margin: 10px 0 0;
            color: #2c3e50;
        }

        canvas {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            margin-right: 10px;
        }
    </style>
</head>

<body>

<h1>📊 Business Analytics Dashboard</h1>

<!-- CARDS -->
<div class="cards">

    <div class="card">
        <h3>Products</h3>
        <h2 th:text="${totalProducts}"></h2>
    </div>

    <div class="card">
        <h3>Sales</h3>
        <h2 th:text="${totalSales}"></h2>
    </div>

    <div class="card">
        <h3>Revenue</h3>
        <h2 th:text="${totalRevenue}"></h2>
    </div>

    <div class="card">
        <h3>Best Product</h3>
        <h2 th:text="${bestProduct}"></h2>
    </div>

</div>

<!-- CHART -->
<h2>📈 Sales Chart</h2>

<canvas id="salesChart" width="600" height="300"></canvas>

<script th:inline="javascript">

    const labels = /*[[${salesLabels}]]*/ [];
    const data = /*[[${salesData}]]*/ [];

    new Chart(document.getElementById('salesChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Sales Revenue',
                data: data,
                backgroundColor: '#28a745'
            }]
        }
    });

</script>

<!-- LINKS -->
<a href="/products">🛍 Products</a>
<a href="/sales">💰 Sales</a>

</body>
</html>
