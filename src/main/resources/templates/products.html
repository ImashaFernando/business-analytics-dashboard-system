<!DOCTYPE html>
<html lang="aa">
<head>
    <title>Products</title>

    <style>
        :root {
            --bg: #0d0f14;
            --card: #161920;
            --border: #262a35;
            --text: #e6e6e6;
            --muted: #9aa4b2;

            --purple: #8b7dff;
            --green: #20c997;
            --red: #ff4d4d;
            --yellow: #ffb020;
        }

        /* RESET */
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* CONTAINER */
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 30px;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        /* TITLE */
        h2 {
            margin: 0;
        }

        /* ================= BUTTONS ================= */

        .btn {
            padding: 10px 14px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            transition: 0.25s;
            display: inline-block;
        }

        .btn-primary {
            background: var(--purple);
        }

        .btn-primary:hover {
            background: #6f63ff;
        }

        .btn-secondary {
            background: #2a2f3a;
        }

        .btn-secondary:hover {
            background: #3a4050;
        }

        /* ================= CARD ================= */

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        /* ================= TABLE ================= */

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead {
            background: #1f2430;
        }

        th {
            text-align: left;
            padding: 14px;
            color: var(--muted);
            font-weight: 600;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: rgba(255,255,255,0.03);
            transition: 0.2s;
        }

        /* ================= ACTION BUTTONS ================= */

        .btn-sm {
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 12px;
            text-decoration: none;
            margin-right: 5px;
            display: inline-block;
            transition: 0.2s;
        }

        /* EDIT BUTTON */
        .edit {
            background: var(--yellow);
            color: black;
        }

        /* DELETE BUTTON */
        .delete {
            background: var(--red);
            color: white;
        }

        /* HOVER EFFECT */
        .btn-sm:hover {
            transform: scale(1.05);
            opacity: 0.85;
        }
    </style>
</head>


<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <h2>📦 Products</h2>

        <div>
            <a href="/dashboard" class="btn btn-secondary">⬅ Dashboard</a>
            <a href="/products/add" class="btn btn-primary">+ Add Product</a>
        </div>
    </div>

    </div>
<div class="card">

    <table>

        <thead>
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Stock Status</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="p : ${products}">

            <td th:text="${p.name}"></td>

            <td th:text="${p.price}"></td>

            <td th:text="${p.quantity}"></td>

            <!-- STOCK STATUS (FIXED) -->
            <td>

                <span th:if="${p.quantity <= 0}" class="badge out">
                    OUT OF STOCK
                </span>

                <span th:if="${p.quantity > 0 and p.quantity <= 5}" class="badge low">
                    LOW
                </span>

                <span th:if="${p.quantity > 5}" class="badge ok">
                    OK
                </span>

            </td>

            <!-- ACTIONS (FIXED) -->
            <td>

                <a th:href="@{'/products/edit/' + ${p.id}}"
                   class="btn-sm edit">
                    Edit
                </a>

                <a th:href="@{'/products/delete/' + ${p.id}}"
                   class="btn-sm delete"
                   onclick="return confirm('Are you sure?')">
                    Delete
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>







</body>
</html>
