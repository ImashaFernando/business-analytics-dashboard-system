<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products</title>

    <style>
        :root {
            --bg: #0d0f14;
            --card: #161920;
            --border: #262a35;
            --text: #e6e6e6;
            --muted: #9aa4b2;
            --purple: #8b7dff;
            --green: #20c997;
            --red: #ff4d4d;
            --yellow: #ffb020;
        }

        body {
            margin: 0;
            font-family: Arial;
            background: var(--bg);
            color: var(--text);
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 30px;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h2 {
            margin: 0;
        }

        /* BUTTONS */
        .btn {
            padding: 10px 14px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-primary {
            background: var(--purple);
        }

        .btn-primary:hover {
            background: #6f63ff;
        }

        .btn-secondary {
            background: #2a2f3a;
        }

        .btn-secondary:hover {
            background: #3a4050;
        }

        /* TABLE CARD */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: var(--text);
        }

        thead {
            background: #1f2430;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        tr:hover {
            background: #1a1f2a;
        }

        /* ACTION BUTTONS */
        .btn-sm {
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 12px;
            text-decoration: none;
            margin-right: 5px;
        }

        .edit {
            background: var(--yellow);
            color: black;
        }

        .delete {
            background: var(--red);
            color: white;
        }

        .edit:hover {
            opacity: 0.8;
        }

        .delete:hover {
            opacity: 0.8;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">

        <h2>📦 Products</h2>

        <div>
            <a href="/dashboard" class="btn btn-secondary">⬅ Dashboard</a>
            <a href="/products/add" class="btn btn-primary">+ Add Product</a>
        </div>

    </div>

    <!-- TABLE -->
    <div class="card">

        <table>

            <thead>
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="p : ${products}">
                <td th:text="${p.name}"></td>
                <td th:text="${p.price}"></td>
                <td th:text="${p.quantity}"></td>

                <td>
                    <a th:href="@{'/products/edit/' + ${p.id}}" class="btn-sm edit">Edit</a>
                    <a th:href="@{'/products/delete/' + ${p.id}}" class="btn-sm delete"
                       onclick="return confirm('Are you sure?')">Delete</a>
                </td>
            </tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
