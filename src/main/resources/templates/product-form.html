<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Form</title>

    <style>

        :root {
            --bg: #0d0f14;
            --card: #161920;
            --border: #262a35;

            --text: #e6e6e6;
            --muted: #9aa4b2;

            --green: #20c997;
            --purple: #8b7dff;
            --blue: #4da3ff;
        }

        body {
            margin: 0;
            font-family: Arial;
            background: var(--bg);
            color: var(--text);

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* FORM CARD */
        .card {
            width: 500px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        h2 {
            margin-bottom: 20px;
            color: var(--text);
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            color: var(--muted);
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0f1218;
            color: var(--text);
            outline: none;
        }

        input:focus {
            border-color: var(--purple);
        }

        /* BUTTONS */
        .btn {
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }

        .btn-save {
            background: var(--green);
            color: white;
        }

        .btn-back {
            background: #2b2f3a;
            color: white;
            margin-left: 10px;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            opacity: 0.85;
        }

    </style>
</head>

<body>

<div class="card">

    <h2>📦 Product Form</h2>

    <form action="/products/save" method="post">

        <label>Product Name</label>
        <input type="text" name="name" placeholder="Enter product name" required>

        <label>Price</label>
        <input type="number" name="price" placeholder="Enter price" required>

        <label>Quantity</label>
        <input type="number" name="quantity" placeholder="Enter quantity" required>

        <button type="submit" class="btn btn-save">Save Product</button>

        <a href="/dashboard" class="btn btn-back">Back</a>

    </form>

</div>

</body>
</html>
