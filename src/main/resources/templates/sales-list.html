<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sales List</title>

    <style>

        :root {
            --bg: #0d0f14;
            --card: #161920;
            --border: #262a35;

            --text: #e6e6e6;
            --muted: #9aa4b2;

            --green: #20c997;
            --purple: #8b7dff;
            --red: #ff4d4d;
            --blue: #4da3ff;
        }

        body {
            margin: 0;
            font-family: Arial;
            background: var(--bg);
            color: var(--text);

            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
        }

        /* HEADER TOP BAR */
        .top-bar {
            width: 80%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            color: var(--text);
        }

        /* BACK BUTTON RIGHT CORNER */
        .btn {
            padding: 8px 12px;
            text-decoration: none;
            border-radius: 6px;
            color: white;
            background: var(--blue);
            transition: 0.3s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        /* TABLE */
        table {
            width: 80%;
            border-collapse: collapse;
            background: var(--card);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        th, td {
            border: 1px solid var(--border);
            padding: 12px;
            text-align: center;
            color: var(--text);
        }

        th {
            background: #1f2430;
            color: white;
        }

        tr:nth-child(even) {
            background: #141821;
        }

        tr:hover {
            background: #1a1f2a;
        }

        .delete {
            background: var(--red);
        }

    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="top-bar">
    <h1>💰 Sales List</h1>

    <!-- RIGHT CORNER BUTTON -->
    <a href="/dashboard" class="btn">⬅ Back to Dashboard</a>
</div>

<table>

    <tr>
        <th>Product</th>
        <th>Quantity</th>
        <th>Total</th>
        <th>Date</th>
        <th>Action</th>
    </tr>

    <tr th:each="s : ${sales}">
        <td th:text="${s.product.name}"></td>
        <td th:text="${s.quantity}"></td>
        <td th:text="${s.total}"></td>
        <td th:text="${s.date}"></td>

        <td>
            <a th:href="@{'/sales/delete/' + ${s.id}}"
               class="btn delete"
               onclick="return confirm('Are you sure?')">
                Delete
            </a>
        </td>
    </tr>

</table>

</body>
</html>
